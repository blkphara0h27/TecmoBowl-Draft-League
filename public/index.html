<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Draft Room</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:10px;}

#layout{display:grid;grid-template-columns:1fr 2fr 1fr;gap:20px;}

#players{background:white;padding:10px;max-height:500px;overflow:auto;border-radius:6px;}

.player{padding:12px;border-bottom:1px solid #ddd;cursor:pointer;}
.player:hover{background:#eee;}

.qb{background:#ffd6d6}
.rb{background:#d6ffd6}
.wr{background:#d6e4ff}
.te{background:#f0d6ff}
.k{background:#fff3b0}
.def{background:#e0e0e0}

#board{background:white;padding:10px;border-radius:6px;overflow-x:auto;white-space:nowrap;}

.round{display:flex;}

.cell{
width:120px;border:1px solid #ccc;padding:6px;font-size:12px;height:45px;
display:flex;align-items:center;justify-content:center;
}

.header{background:#ddd;font-weight:bold;}

#history{background:white;padding:10px;max-height:250px;overflow:auto;border-radius:6px;}

#timer{color:red;font-weight:bold;}

#playerCard{
display:none;position:fixed;top:10%;left:5%;width:90%;max-width:400px;
background:white;border:2px solid black;padding:15px;z-index:1000;
}

button{padding:8px;margin:2px;cursor:pointer;}
</style>

</head>

<body>

<h2>Snake Draft Room</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="resetDraft()">Reset Draft</button>

<br><br>

Draft Timer: <span id="timer">60</span>

<div id="layout">

<div>
<h3>Players</h3>

<button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('QB')">QB</button>
<button onclick="setFilter('RB')">RB</button>
<button onclick="setFilter('WR')">WR</button>
<button onclick="setFilter('TE')">TE</button>
<button onclick="setFilter('TEAMS')">Teams</button> <!-- ✅ ADDED -->

<br><br>

<input id="search" onkeyup="render()" placeholder="Search...">

<div id="players"></div>
</div>

<div>
<h3>Draft Board</h3>
<div id="board"></div>
</div>

<div>
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<div id="playerCard">
<h3 id="cardName"></h3>
<div id="cardStats"></div>
<br>
<button id="draftButton">Draft</button>
<button onclick="closeCard()">Close</button>
</div>

<script>

if (typeof io === "undefined") {
  alert("Socket.io failed to load")
}

const socket = io()

let state = {}
let positionFilter = "ALL"

/* ---------- SOCKET ---------- */

socket.on("state", s=>{
  state = s
  render()
})

socket.on("timer", t=>{
  document.getElementById("timer").innerText = t
})

/* ---------- START (FIXED) ---------- */

function start(){

fetch("/players.json")
.then(r=>{
  if(!r.ok) throw new Error("players.json not found")
  return r.json()
})
.then(data=>{

  let players = data.players
  let teams = data.teams   // ✅ LOAD TEAMS FROM JSON

  if(!players || !Array.isArray(players)){
    alert("Players file broken")
    return
  }

  if(!teams || !Array.isArray(teams)){
    alert("Teams missing in JSON")
    return
  }

  socket.emit("setup",{teams,players})

})
.catch(err=>{
  console.error(err)
  alert("Error loading players.json")
})

}

/* ---------- ACTIONS ---------- */

function draft(name){
  socket.emit("draft", name)
}

function pause(){ socket.emit("pause") }
function undo(){ socket.emit("undo") }

function resetDraft(){
  socket.emit("setup",{teams:state.teams,players:state.players})
}

/* ---------- PLAYER CARD ---------- */

function showPlayerCard(player){

document.getElementById("playerCard").style.display="block"

document.getElementById("cardName").innerText =
player.name+" ("+player.position+")"

let stats=""

for(let key in player){
if(key==="name"||key==="position"||key==="team") continue
stats+=key+": "+player[key]+"<br>"
}

document.getElementById("cardStats").innerHTML=stats

document.getElementById("draftButton").onclick=function(){
draft(player.name)
closeCard()
}

}

function closeCard(){
document.getElementById("playerCard").style.display="none"
}

/* ---------- FILTER ---------- */

function setFilter(pos){
positionFilter=pos
render()
}

/* ---------- RENDER ---------- */

function render(){

if(!state.players || !Array.isArray(state.players)) return

let list=document.getElementById("players")
list.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

/* 🔥 TEAMS MODE */

if(positionFilter === "TEAMS"){

  let teams = state.teams || []

  teams.forEach(t=>{

    if(!t.name.toLowerCase().includes(search)) return

    let d=document.createElement("div")
    d.className="player"

    d.innerHTML = `
      <strong>${t.name}</strong><br>
      OL Rush: ${t.ol.rushingPower}<br>
      OL Hit: ${t.ol.hittingPower}
    `

    list.appendChild(d)

  })

  return
}

/* ---------- PLAYERS ---------- */

state.players.forEach(p=>{

if(positionFilter!=="ALL" && p.position!==positionFilter) return
if(state.drafted.includes(p.name)) return
if(!p.name.toLowerCase().includes(search)) return

let d=document.createElement("div")

d.className="player "+p.position.toLowerCase()
d.innerText=p.name+" ("+p.position+")"

d.onclick=()=>showPlayerCard(p)

list.appendChild(d)

})

/* ---------- BOARD (FIXED) ---------- */

let board=document.getElementById("board")
board.innerHTML=""

let teams=state.teams||[]
let picks=state.drafted||[]
let cols=teams.length

let header=document.createElement("div")
header.className="round"

let roundHeader=document.createElement("div")
roundHeader.className="cell header"
roundHeader.innerText="Round"

header.appendChild(roundHeader)

teams.forEach(team=>{
let cell=document.createElement("div")
cell.className="cell header"
cell.innerText=team.name   // ✅ FIXED
header.appendChild(cell)
})

board.appendChild(header)

/* ---------- HISTORY (FIXED) ---------- */

let history=document.getElementById("history")
history.innerHTML=""

picks.forEach((p,i)=>{
let team=teams[state.draftOrder[i]]?.name  // ✅ FIXED

let row=document.createElement("div")
row.innerText=(i+1)+". "+team+" → "+p

history.appendChild(row)
})

}

</script>

</body>
</html>
