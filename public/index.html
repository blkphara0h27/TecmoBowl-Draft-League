
<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Draft Room</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:10px;}
#layout{display:grid;grid-template-columns:1fr 2fr 1fr;gap:20px;}

#players{background:white;padding:10px;max-height:500px;overflow:auto;border-radius:6px;}
.player{padding:12px;border-bottom:1px solid #ddd;cursor:pointer;}
.player:hover{background:#eee;}

#board{background:white;padding:10px;border-radius:6px;overflow-x:auto;}
.round{display:flex;}

.cell{
width:120px;border:1px solid #ccc;padding:6px;height:45px;
display:flex;align-items:center;justify-content:center;
}

.header{background:#ddd;font-weight:bold;}

#history{background:white;padding:10px;max-height:250px;overflow:auto;border-radius:6px;}
#timer{color:red;font-weight:bold;}

button{padding:8px;margin:2px;}
</style>
</head>

<body>

<h2>Snake Draft Room</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>

<br><br>

Draft Timer: <span id="timer">60</span>

<div id="layout">

<div>
<h3>Players</h3>
<input id="search" onkeyup="render()" placeholder="Search...">
<div id="players"></div>
</div>

<div>
<h3>Draft Board</h3>
<div id="board"></div>
</div>

<div>
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>
const socket = io()

let state = {}

/* ---------- SOCKET ---------- */

socket.on("state", s=>{
  state = s
  render()
})

socket.on("timer", t=>{
  document.getElementById("timer").innerText = t
})

/* ---------- START DRAFT (FIXED) ---------- */

window.start = function(){

  fetch("/players.json")
  .then(r => {
    if (!r.ok) throw new Error("players.json not found")
    return r.json()
  })
  .then(data => {

    console.log("✅ JSON LOADED:", data)

    if(!data.players){
      alert("players.json missing players array")
      return
    }

    let input = prompt("Enter draft users (comma separated)")
    if(!input) return

    let teams = input.split(",").map(t=>t.trim())

    socket.emit("setup",{
      teams: teams,
      players: data.players,
      nflTeams: data.teams || []
    })

  })
  .catch(err => {
    console.error("❌ ERROR:", err)
    alert("FAILED TO LOAD players.json")
  })
}

/* ---------- CONTROLS ---------- */

window.pause = ()=>socket.emit("pause")
window.undo = ()=>socket.emit("undo")

/* ---------- RENDER ---------- */

function render(){

  let list = document.getElementById("players")
  list.innerHTML = ""

  if(!state.players) return

  state.players.forEach(p => {

    if(state.drafted && state.drafted.includes(p.name)) return

    let div = document.createElement("div")
    div.className = "player"
    div.innerText = p.name + " (" + p.position + ")"

    div.onclick = () => {
      socket.emit("draft", p.name)
    }

    list.appendChild(div)
  })

  let board = document.getElementById("board")
  board.innerHTML = ""

  if(!state.teams || !state.draftOrder) return

  let picks = state.drafted || []

  for(let i = 0; i < picks.length; i++){
    let div = document.createElement("div")
    div.className = "cell"
    div.innerText = picks[i]
    board.appendChild(div)
  }

  let history = document.getElementById("history")
  history.innerHTML = ""

  picks.slice().reverse().forEach(p=>{
    let div = document.createElement("div")
    div.innerText = p
    history.appendChild(div)
  })
}
</script>

</body>
</html>
