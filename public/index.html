<!DOCTYPE html><html>
<head><title>Snake Draft Room</title><script src="/socket.io/socket.io.js"></script><style>

body{
font-family:Arial;
margin:20px;
}

.container{
display:flex;
gap:40px;
}

#players{
height:600px;
overflow-y:auto;
border:1px solid #ccc;
padding:10px;
width:300px;
}

.player{
padding:5px;
cursor:pointer;
}

.player:hover{
background:#eee;
}

#draftBoard{
font-size:16px;
}

button{
margin:3px;
}

</style></head><body><h1>Snake Draft Room</h1><button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="resetDraft()">Reset Draft</button>
<button onclick="exportDraft()">Export</button>

<h3>Current Pick: <span id="currentPick"></span></h3>
<h3>Draft Timer: <span id="timer">60</span></h3><div class="container"><div><h2>Players</h2><h4>Position Filter</h4><button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('QB')">QB</button>
<button onclick="setFilter('RB')">RB</button>
<button onclick="setFilter('WR')">WR</button>
<button onclick="setFilter('TE')">TE</button>
<button onclick="setFilter('K')">K</button>
<button onclick="setFilter('DEF')">DEF</button>

<h4>Search</h4><input onkeyup="searchPlayers(this.value)" /><div id="players"></div></div><div><h2>Draft Board</h2><div id="draftBoard"></div></div></div><script>

const socket = io()

let players = []
let state = {teams:[],drafted:[],draftOrder:[]}

let filter="ALL"
let search=""

fetch("/players.json")
.then(res=>res.json())
.then(data=>{
players=data
renderPlayers()
})

socket.on("state",s=>{
state=s
renderPlayers()
renderBoard()
})

socket.on("timer",t=>{
document.getElementById("timer").innerText=t
})

function renderPlayers(){

const list=document.getElementById("players")
list.innerHTML=""

players
.filter(p=>!state.drafted.includes(p.name))
.filter(p=>filter==="ALL"||p.pos===filter)
.filter(p=>p.name.toLowerCase().includes(search))
.forEach(p=>{

const div=document.createElement("div")

div.className="player"

div.innerText=p.name+" ("+p.pos+")"

div.onclick=()=>{
socket.emit("draft",p.name)
}

list.appendChild(div)

})

}

function renderBoard(){

const board=document.getElementById("draftBoard")
board.innerHTML=""

state.drafted.forEach((p,i)=>{

const row=document.createElement("div")

row.innerText=(i+1)+". "+p

board.appendChild(row)

})

}

function start(){

const input=prompt("Enter team names separated by commas")

if(!input)return

const teams=input.split(",").map(t=>t.trim())

socket.emit("setup",{
teams:teams,
players:players
})

}

function pause(){
socket.emit("pause")
}

function undo(){
socket.emit("undo")
}

function resetDraft(){
location.reload()
}

function exportDraft(){

let text=state.drafted.join("\n")

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="draft.txt"

a.click()

}

function setFilter(p){
filter=p
renderPlayers()
}

function searchPlayers(v){
search=v.toLowerCase()
renderPlayers()
}

</script></body>
</html>margin:3px;
}
