<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Draft Room</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
font-family:Arial;
background:#f0f0f0;
margin:10px;
}

#layout{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:20px;
}

#players, #board, #history, #rosters{
background:white;
padding:10px;
border-radius:6px;
}

#players{
max-height:500px;
overflow:auto;
}

.player{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.player:hover{
background:#eee;
}

.cell{
width:120px;
border:1px solid #ccc;
padding:5px;
text-align:center;
}

.round{
display:flex;
}

.header{
font-weight:bold;
background:#ddd;
}

button{
margin:2px;
padding:6px;
cursor:pointer;
}

#timer{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Snake Draft Room</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="resetDraft()">Reset Draft</button>
<button onclick="exportDraft()">Export</button>

<br><br>

Current Pick: <span id="current"></span><br>
Draft Timer: <span id="timer">60</span>

<br><br>

<h3>Players</h3>

<button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('QB')">QB</button>
<button onclick="setFilter('RB')">RB</button>
<button onclick="setFilter('WR')">WR</button>
<button onclick="setFilter('TE')">TE</button>
<button onclick="setFilter('K')">K</button>
<button onclick="setFilter('DEF')">DEF</button>
<button onclick="showOL()">OL</button>

<br><br>

Search<br>
<input id="search" onkeyup="render()">

<div id="layout">

<div id="players"></div>

<div>
<h3>Draft Board</h3>
<div id="board"></div>
</div>

<div>
<h3>Draft History</h3>
<div id="history"></div>

<h3>Team Rosters</h3>
<div id="rosters"></div>
</div>

</div>

<script>

const socket = io()

let state = {}
let filter = "ALL"

socket.on("state", s=>{
  state = s
  render()
})

socket.on("timer", t=>{
  document.getElementById("timer").innerText = t
})

/* ---------- START ---------- */

function start(){
  let input = prompt("Enter team names separated by comma")
  if(!input) return

  let teams = input.split(",").map(t=>t.trim())

  socket.emit("setup",{teams})
}

/* ---------- ACTIONS ---------- */

function draft(name){
  socket.emit("draft",name)
}

function pause(){
  socket.emit("pause")
}

function undo(){
  socket.emit("undo")
}

function resetDraft(){
  socket.emit("setup",{teams:state.teams})
}

/* ---------- FILTER ---------- */

function setFilter(f){
  filter = f
  render()
}

/* ---------- OL VIEW ---------- */

function showOL(){

  let list = document.getElementById("players")
  list.innerHTML=""

  if(!state.teamsData) return

  state.teamsData.forEach(t=>{

    let d=document.createElement("div")
    d.className="player"

    d.innerText =
      t.name +
      " | Run: " + t.ol.rushingPower +
      " | Pass: " + t.ol.hittingPower

    list.appendChild(d)

  })
}

/* ---------- EXPORT ---------- */

function exportDraft(){

  let teams=state.teams
  let picks=state.drafted
  let cols=teams.length

  let csv="Round,"+teams.join(",")+"\n"

  let round=1

  for(let i=0;i<picks.length;i+=cols){

    let row=[round]

    for(let j=0;j<cols;j++){
      row.push(picks[i+j]||"")
    }

    csv+=row.join(",")+"\n"
    round++
  }

  let blob=new Blob([csv])
  let url=URL.createObjectURL(blob)

  let a=document.createElement("a")
  a.href=url
  a.download="draft.csv"
  a.click()
}

/* ---------- RENDER ---------- */

function render(){

  console.log(state)

  let list=document.getElementById("players")
  list.innerHTML=""

  let search=document.getElementById("search").value.toLowerCase()

  if(!state.players) return

  state.players.forEach(p=>{

    if(filter!=="ALL" && p.position!==filter) return
    if(state.drafted.includes(p.name)) return
    if(!p.name.toLowerCase().includes(search)) return

    let d=document.createElement("div")
    d.className="player"

    d.innerText=p.name+" ("+p.position+")"

    d.onclick=()=>draft(p.name)

    list.appendChild(d)
  })

  /* BOARD */

  let board=document.getElementById("board")
  board.innerHTML=""

  let teams=state.teams||[]
  let picks=state.drafted||[]
  let cols=teams.length

  if(cols===0) return

  let header=document.createElement("div")
  header.className="round"

  let rCell=document.createElement("div")
  rCell.className="cell header"
  rCell.innerText="Round"
  header.appendChild(rCell)

  teams.forEach(t=>{
    let c=document.createElement("div")
    c.className="cell header"
    c.innerText=t
    header.appendChild(c)
  })

  board.appendChild(header)

  let rounds=Math.ceil(picks.length/cols)

  for(let r=0;r<rounds;r++){

    let row=document.createElement("div")
    row.className="round"

    let rc=document.createElement("div")
    rc.className="cell header"
    rc.innerText=r+1
    row.appendChild(rc)

    let cells=[]

    for(let c=0;c<cols;c++){
      let cell=document.createElement("div")
      cell.className="cell"
      cells.push(cell)
      row.appendChild(cell)
    }

    for(let i=0;i<cols;i++){
      let idx=r*cols+i
      if(!picks[idx]) continue

      let teamIndex=state.draftOrder[idx]
      cells[teamIndex].innerText=picks[idx]
    }

    board.appendChild(row)
  }

  /* HISTORY */

  let history=document.getElementById("history")
  history.innerHTML=""

  picks.forEach((p,i)=>{
    let t=teams[state.draftOrder[i]]
    let d=document.createElement("div")
    d.innerText=(i+1)+". "+t+" → "+p
    history.appendChild(d)
  })
}

</script>

</body>
</html>
