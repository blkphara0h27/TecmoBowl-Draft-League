<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Draft Room</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:10px;}

#layout{display:grid;grid-template-columns:1fr 2fr 1fr;gap:20px;}

#mobileTabs{display:none;margin-bottom:10px;}

.tabBtn{padding:10px;border:none;background:#ddd;margin-right:5px;font-weight:bold;}
.tabBtn.active{background:#888;color:white;}

#players{background:white;padding:10px;max-height:500px;overflow:auto;border-radius:6px;}

.player{padding:12px;border-bottom:1px solid #ddd;cursor:pointer;font-size:14px;}
.player:hover{background:#eee;}

.qb{background:#ffd6d6}
.rb{background:#d6ffd6}
.wr{background:#d6e4ff}
.te{background:#f0d6ff}
.k{background:#fff3b0}
.def{background:#e0e0e0}

#board{background:white;padding:10px;border-radius:6px;overflow-x:auto;white-space:nowrap;}

.round{display:flex;}

.cell{
width:120px;border:1px solid #ccc;padding:6px;font-size:12px;
height:45px;display:flex;align-items:center;justify-content:center;text-align:center;
}

.header{font-weight:bold;background:#e3e3e3;}

#history{background:white;padding:10px;max-height:250px;overflow:auto;border-radius:6px;}

#rosters{background:white;padding:10px;margin-top:10px;border-radius:6px;}

button{padding:8px;margin:2px;cursor:pointer;}

#timer{font-weight:bold;color:red;}

#playerCard{
display:none;position:fixed;top:10%;left:5%;width:90%;
max-width:400px;background:white;border:2px solid black;padding:15px;z-index:1000;
}

@media (max-width:900px){
#layout{grid-template-columns:1fr;}
#mobileTabs{display:block;}
.tabSection{display:none;}
.tabSection.active{display:block;}
}
</style>
</head>

<body>

<h2>Snake Draft Room</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="resetDraft()">Reset Draft</button>
<button onclick="exportDraft()">Export</button>

<br><br>

Current Pick: <span id="current"></span>
<br>
Draft Timer: <span id="timer">60</span>

<br><br>

<div id="mobileTabs">
<button class="tabBtn active" onclick="openTab('playersTab',event)">Players</button>
<button class="tabBtn" onclick="openTab('boardTab',event)">Board</button>
<button class="tabBtn" onclick="openTab('historyTab',event)">History</button>
</div>

<div id="layout">

<div id="playersTab" class="tabSection active">
<h3>Players</h3>

<h4>Position Filter</h4>

<button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('QB')">QB</button>
<button onclick="setFilter('RB')">RB</button>
<button onclick="setFilter('WR')">WR</button>
<button onclick="setFilter('TE')">TE</button>
<button onclick="setFilter('K')">K</button>
<button onclick="setFilter('DEF')">DEF</button>

<br><br>

Search<br>
<input id="search" onkeyup="render()">

<br><br>
<div id="players"></div>
</div>

<div id="boardTab" class="tabSection">
<h3>Draft Board</h3>
<div id="board"></div>
</div>

<div id="historyTab" class="tabSection">
<h3>Draft History</h3>
<div id="history"></div>

<h3>Team Rosters</h3>
<div id="rosters"></div>
</div>

</div>

<div id="playerCard">
<h3 id="cardName"></h3>
<div id="cardStats"></div>
<br>
<button id="draftButton">Draft</button>
<button onclick="closeCard()">Close</button>
</div>

<script>
const socket = io()

let state = {}
let positionFilter = "ALL"

// ✅ LOAD LOCAL SAVE
window.onload = () => {
  const saved = localStorage.getItem("draftState")
  if(saved){
    state = JSON.parse(saved)
    render()
  }
}

// ✅ RECEIVE SERVER STATE
socket.on("state", s => {
  state = s

  // 💾 SAVE LOCALLY
  localStorage.setItem("draftState", JSON.stringify(state))

  render()
})

socket.on("timer", t => {
  document.getElementById("timer").innerText = t
})

// ---------------- FUNCTIONS ----------------

function openTab(tab,e){
  document.querySelectorAll(".tabSection").forEach(t=>t.classList.remove("active"))
  document.getElementById(tab).classList.add("active")
  document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"))
  e.target.classList.add("active")
}

function start(){
  fetch("players.json")
  .then(r=>r.json())
  .then(players=>{
    let input = prompt("Enter team names separated by comma")
    if(!input) return
    let teams = input.split(",").map(t=>t.trim())
    socket.emit("setup",{teams,players})
  })
}

function draft(name){ socket.emit("draft",name) }
function pause(){ socket.emit("pause") }
function undo(){ socket.emit("undo") }

function resetDraft(){
  if(!state.teams) return
  socket.emit("setup",{teams:state.teams,players:state.players})
}

function exportDraft(){
  let teams=state.teams||[]
  let picks=state.drafted||[]
  let cols=teams.length

  let csv="Round,"+teams.join(",")+"\n"
  let round=1

  for(let i=0;i<picks.length;i+=cols){
    let row=[round]
    for(let j=0;j<cols;j++){
      row.push(picks[i+j]||"")
    }
    csv+=row.join(",")+"\n"
    round++
  }

  let blob=new Blob([csv])
  let a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="draft.csv"
  a.click()
}

// ---------------- PLAYER CARD ----------------

function showPlayerCard(player){
  document.getElementById("playerCard").style.display="block"
  document.getElementById("cardName").innerText = player.name+" ("+player.position+")"

  let stats=""
  for(let key in player){
    if(key==="name"||key==="position"||key==="team") continue
    stats+=key+": "+player[key]+"<br>"
  }

  document.getElementById("cardStats").innerHTML=stats

  document.getElementById("draftButton").onclick=function(){
    draft(player.name)
    closeCard()
  }
}

function closeCard(){
  document.getElementById("playerCard").style.display="none"
}

function setFilter(pos){
  positionFilter=pos
  render()
}

// ---------------- RENDER ----------------

function render(){

  document.getElementById("current").innerText = (state.currentPick || 0) + 1

  let list=document.getElementById("players")
  list.innerHTML=""

  let search=document.getElementById("search").value.toLowerCase()

  if(!state.players) return

  state.players.forEach(p=>{
    if(positionFilter!=="ALL" && p.position!==positionFilter) return
    if(state.drafted && state.drafted.includes(p.name)) return
    if(!p.name.toLowerCase().includes(search)) return

    let d=document.createElement("div")
    d.className="player "+p.position.toLowerCase()
    d.innerText=p.name+" ("+p.position+")"
    d.onclick=()=>showPlayerCard(p)
    list.appendChild(d)
  })

  // BOARD
  let board=document.getElementById("board")
  board.innerHTML=""

  let teams=state.teams||[]
  let picks=state.drafted||[]
  let cols=teams.length

  let header=document.createElement("div")
  header.className="round"

  let roundHeader=document.createElement("div")
  roundHeader.className="cell header"
  roundHeader.innerText="Round"
  header.appendChild(roundHeader)

  teams.forEach(team=>{
    let cell=document.createElement("div")
    cell.className="cell header"
    cell.innerText=team
    header.appendChild(cell)
  })

  board.appendChild(header)

  let totalRounds=Math.ceil(picks.length/(cols||1))

  for(let r=0;r<totalRounds;r++){
    let row=document.createElement("div")
    row.className="round"

    let roundCell=document.createElement("div")
    roundCell.className="cell header"
    roundCell.innerText=r+1
    row.appendChild(roundCell)

    let cells=[]
    for(let c=0;c<cols;c++){
      let cell=document.createElement("div")
      cell.className="cell"
      cells.push(cell)
      row.appendChild(cell)
    }

    for(let i=0;i<cols;i++){
      let pickIndex=r*cols+i
      if(!picks[pickIndex]) continue
      let teamIndex=state.draftOrder[pickIndex]
      if(cells[teamIndex]) cells[teamIndex].innerText=picks[pickIndex]
    }

    board.appendChild(row)
  }

  // HISTORY
  let history=document.getElementById("history")
  history.innerHTML=""

  picks.forEach((p,i)=>{
    let team=teams[state.draftOrder?.[i]]
    let row=document.createElement("div")
    row.innerText=(i+1)+". "+team+" → "+p
    history.appendChild(row)
  })
}

</script>

</body>
</html>
