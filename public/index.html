<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Draft Room</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{font-family:Arial;background:#f0f0f0;margin:10px}
#layout{display:grid;grid-template-columns:1fr 2fr 1fr;gap:20px}
#players{background:white;padding:10px;max-height:500px;overflow:auto;border-radius:6px}
.player{padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
.player:hover{background:#eee}
.qb{background:#ffd6d6}
.rb{background:#d6ffd6}
.wr{background:#d6e4ff}
.te{background:#f0d6ff}
#board{background:white;padding:10px;border-radius:6px}
.cell{width:120px;border:1px solid #ccc;padding:5px;font-size:12px}
.header{font-weight:bold;background:#ddd}
</style>
</head>

<body>

<h2>Snake Draft</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>

<br><br>

Timer: <span id="timer">60</span>

<div id="layout">

<div>
<h3>Players</h3>
<input id="search" onkeyup="render()" placeholder="Search...">
<div id="players"></div>
</div>

<div>
<h3>Board</h3>
<div id="board"></div>
</div>

<div>
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>

const socket = io()
let state = {}

socket.on("state", s=>{
  state = s
  render()
})

socket.on("timer", t=>{
  document.getElementById("timer").innerText = t
})

function start(){

  console.log("Start clicked")

  fetch("/players.json")
  .then(r=>{
    if(!r.ok) throw new Error("players.json missing")
    return r.json()
  })
  .then(data=>{

    let players = data.players || data

    let input = prompt("Enter team names separated by comma")
    if(!input) return

    let teams = input.split(",").map(t=>t.trim())

    socket.emit("setup",{teams,players})

  })
  .catch(err=>{
    console.error(err)
    alert("Failed to load players.json")
  })
}

function draft(name){
  socket.emit("draft", name)
}

function pause(){ socket.emit("pause") }
function undo(){ socket.emit("undo") }

function render(){

  if(!state.players) return

  let list = document.getElementById("players")
  list.innerHTML = ""

  let search = document.getElementById("search").value.toLowerCase()

  state.players.forEach(p=>{

    if(state.drafted.includes(p.name)) return
    if(!p.name.toLowerCase().includes(search)) return

    let d = document.createElement("div")

    // 🔥 POSITION COLOR
    d.className = "player " + p.position.toLowerCase()

    // 🔥 SMART STAT DISPLAY
    let stat = p.passing_accuracy || p.receptions || p.maximum_speed || 0

    d.innerText = `${p.name} (${p.position}) ⭐${stat}`

    d.onclick = ()=>draft(p.name)

    list.appendChild(d)
  })

  // HISTORY
  let history = document.getElementById("history")
  history.innerHTML = ""

  state.drafted.forEach((p,i)=>{
    let row = document.createElement("div")
    row.innerText = (i+1) + ". " + p
    history.appendChild(row)
  })
}

</script>

</body>
</html>
