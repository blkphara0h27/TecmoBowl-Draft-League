<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Snake Draft Room</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
margin:10px;
}

/* FIXED LAYOUT */
#layout{
display:grid;
grid-template-columns:300px 1fr 300px;
gap:20px;
}

/* PLAYER LIST */
#players{
background:white;
padding:10px;
max-height:600px;
overflow-y:auto;
border-radius:6px;
}

.player{
padding:12px;
border-bottom:1px solid #ddd;
cursor:pointer;
font-size:14px;
}

.player:hover{
background:#eee;
}

/* POSITION COLORS */
.qb{background:#ffd6d6}
.rb{background:#d6ffd6}
.wr{background:#d6e4ff}
.te{background:#f0d6ff}
.k{background:#fff3b0}
.def{background:#e0e0e0}
.ol{background:#ffe0b3}

/* DRAFT BOARD */
#board{
background:white;
padding:10px;
border-radius:6px;
overflow-x:auto;
white-space:nowrap;
}

.round{
display:flex;
}

.cell{
width:120px;
border:1px solid #ccc;
padding:6px;
font-size:12px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.header{
font-weight:bold;
background:#e3e3e3;
}

/* HISTORY */
#history{
background:white;
padding:10px;
max-height:300px;
overflow:auto;
border-radius:6px;
}

/* BUTTONS */
button{
padding:8px;
margin:2px;
cursor:pointer;
}

#timer{
font-weight:bold;
color:red;
}

</style>

</head>

<body>

<h2>Snake Draft Room</h2>

<button onclick="start()">Start Draft</button>
<button onclick="pause()">Pause</button>
<button onclick="undo()">Undo</button>
<button onclick="resetDraft()">Reset Draft</button>
<button onclick="exportDraft()">Export</button>

<br><br>

Current Pick: <span id="current"></span>

<br>

Draft Timer: <span id="timer">60</span>

<br><br>

<div id="layout">

<!-- PLAYERS -->
<div>

<h3>Players</h3>

<h4>Position Filter</h4>

<button onclick="setFilter('ALL')">All</button>
<button onclick="setFilter('QB')">QB</button>
<button onclick="setFilter('RB')">RB</button>
<button onclick="setFilter('WR')">WR</button>
<button onclick="setFilter('TE')">TE</button>
<button onclick="setFilter('K')">K</button>
<button onclick="setFilter('DEF')">DEF</button>
<button onclick="setFilter('OL')">OL</button>

<br><br>

Search<br>
<input id="search" onkeyup="render()">

<br><br>

<div id="players"></div>

</div>

<!-- BOARD -->
<div>

<h3>Draft Board</h3>
<div id="board"></div>

</div>

<!-- HISTORY -->
<div>

<h3>Draft History</h3>
<div id="history"></div>

</div>

</div>

<script>

const socket = io()

let state = {}
let positionFilter = "ALL"

socket.on("state", s=>{
state = s
render()
})

socket.on("timer", t=>{
document.getElementById("timer").innerText = t
})

function start(){

fetch("players.json")
.then(r=>r.json())
.then(data=>{

let players = data.players || data

let teams = prompt("Enter team names separated by comma").split(",")

socket.emit("setup",{teams,players})

})

}

function draft(name){
socket.emit("draft", name)
}

function pause(){
socket.emit("pause")
}

function undo(){
socket.emit("undo")
}

function resetDraft(){
socket.emit("setup",{teams:state.teams,players:state.players})
}

function exportDraft(){

let teams=state.teams
let picks=state.drafted
let cols=teams.length

let csv="Round,"+teams.join(",")+"\n"

let round=1

for(let i=0;i<picks.length;i+=cols){

let row=[round]

for(let j=0;j<cols;j++){
row.push(picks[i+j]||"")
}

csv+=row.join(",")+"\n"
round++
}

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="draft.csv"
a.click()

}

function setFilter(pos){
positionFilter = pos
render()
}

function render(){

let list = document.getElementById("players")
list.innerHTML = ""

let search = document.getElementById("search").value.toLowerCase()

if(!state.players) return

// 🔥 PLAYER LIST
state.players.forEach(p=>{

if(positionFilter !== "ALL" && p.position !== positionFilter) return
if(state.drafted.includes(p.name)) return
if(!p.name.toLowerCase().includes(search)) return

let d = document.createElement("div")
d.className = "player " + p.position.toLowerCase()
d.innerText = p.name + " ("+p.position+")"
d.onclick = ()=>draft(p.name)

list.appendChild(d)

})

// 🔥 OL VIEW
if(positionFilter === "OL" && state.teamsData){

state.teamsData.forEach(t=>{

let d = document.createElement("div")
d.className = "player ol"

d.innerText =
t.name +
" | Run: " + t.ol.rushingPower +
" | Pass: " + t.ol.hittingPower

list.appendChild(d)

})

}

// 🔥 BOARD
let board=document.getElementById("board")
board.innerHTML=""

let teams=state.teams||[]
let picks=state.drafted||[]
let cols=teams.length

let header=document.createElement("div")
header.className="round"

let roundHeader=document.createElement("div")
roundHeader.className="cell header"
roundHeader.innerText="Round"
header.appendChild(roundHeader)

teams.forEach(team=>{
let cell=document.createElement("div")
cell.className="cell header"
cell.innerText=team
header.appendChild(cell)
})

board.appendChild(header)

let totalRounds=Math.ceil(picks.length/cols)

for(let r=0;r<totalRounds;r++){

let row=document.createElement("div")
row.className="round"

let roundCell=document.createElement("div")
roundCell.className="cell header"
roundCell.innerText=r+1
row.appendChild(roundCell)

let cells=[]

for(let c=0;c<cols;c++){
let cell=document.createElement("div")
cell.className="cell"
cells.push(cell)
row.appendChild(cell)
}

for(let i=0;i<cols;i++){

let pickIndex=r*cols+i

if(!picks[pickIndex]) continue

let teamIndex=state.draftOrder[pickIndex]
cells[teamIndex].innerText=picks[pickIndex]

}

board.appendChild(row)
}

// 🔥 HISTORY
let history=document.getElementById("history")
history.innerHTML=""

picks.forEach((p,i)=>{

let team=teams[state.draftOrder[i]]

let row=document.createElement("div")
row.innerText=(i+1)+". "+team+" → "+p

history.appendChild(row)

})

}

</script>

</body>

</html>
